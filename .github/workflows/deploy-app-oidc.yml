name: Deploy App (OIDC)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload artifact to Static Web App
        env:
          STATIC_WEBAPP_NAME: ${{ secrets.STATIC_WEBAPP_NAME }}
          APP_ARTIFACT_LOCATION: ${{ secrets.APP_ARTIFACT_LOCATION }}
          RESOURCE_GROUP: ${{ secrets.STATIC_WEBAPP_RESOURCE_GROUP }}
        run: |
          if [ -z "$STATIC_WEBAPP_NAME" ]; then echo "Missing STATIC_WEBAPP_NAME secret" && exit 1; fi
          if [ -z "$APP_ARTIFACT_LOCATION" ]; then echo "Missing APP_ARTIFACT_LOCATION secret" && exit 1; fi
          # Upload built artifact to the target Static Web App
          az staticwebapp upload --name "$STATIC_WEBAPP_NAME" --resource-group "${RESOURCE_GROUP:-rg-portfolio-prod}" --source "$APP_ARTIFACT_LOCATION"

      - name: Print deployed info
        run: |
          echo "Deployed to static app: ${{ secrets.STATIC_WEBAPP_NAME }}"
