name: Run generate-slots once

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Target year'
        required: true
      month:
        description: 'Target month (1-12)'
        required: true

jobs:
  call_endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call generate-slots endpoint
        run: |
          set -e
          YEAR="${{ github.event.inputs.year }}"
          MONTH="${{ github.event.inputs.month }}"
          echo "Calling generate-slots for ${YEAR}-${MONTH}"

          HOST="${{ secrets.APP_URL }}"
          if [ -z "$HOST" ]; then
            HOST="https://purple-beach-0c5d9ca03.7.azurestaticapps.net"
            echo "APP_URL secret not set; falling back to ${HOST}"
          fi

          curl -f -X GET "${HOST}/api/cron/generate-slots?year=${YEAR}&month=${MONTH}" \
            -H "x-admin-api-key: ${{ secrets.ADMIN_API_KEY }}" -v || true